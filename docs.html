<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="index.html" class="brand"><span class="dot">▪</span>Sky Island<span class="mono" style="color:var(--fg-mute); font-weight:400;">/lib</span></a>
    <div class="d-none d-md-flex align-items-center gap-4">
      <a href="index.html#work" class="nav-link">Libraries</a>
      <a href="index.html#philosophy" class="nav-link">Philosophy</a>
      <a href="docs.html" class="nav-link active">Docs</a>
      <a href="https://github.com/briandownss" class="nav-link" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
    <div class="d-flex align-items-center gap-3">
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><span data-theme-icon>○</span></button>
    </div>
  </div>
</nav>

<div class="docs-shell container-fluid">
  <aside class="docs-sidebar">
    <input class="docs-search" id="docs-search" type="search" placeholder="Search docs… (/)" autocomplete="off">
    <nav id="docs-nav"></nav>
  </aside>
  <main class="docs-content" id="docs-content">
    <p class="docs-empty">Loading documentation…</p>
  </main>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/docs.js"></script>
<script>
  // "/" focuses search, like most doc sites
  document.addEventListener("keydown", (e) => {
    if (e.key === "/" && document.activeElement.id !== "docs-search") {
      e.preventDefault();
      document.getElementById("docs-search").focus();
    }
  });
</script>
</body>
</html>
